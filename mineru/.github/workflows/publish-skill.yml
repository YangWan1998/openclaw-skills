name: Publish Skill (on tag)

# Fires on a version tag push (v*.*.*), e.g. v3.2.0 — see the trigger note below.
#
# Distribution model (see the maintenance matrix in the PR/notes):
#   * Most registries AUTO-INDEX from the `main` branch on their own schedule
#     and need NO step here — skills.sh, skillsmp, skillhub.club, lobehub,
#     claudemarketplaces, smithery, the Tencent skillhub.cn mirror, and the
#     Anthropic directory mirror all re-sync from GitHub once listed. They are
#     intentionally omitted, not forgotten.
#   * The only registry with a confirmed non-interactive publish CLI is ClawHub.
#     Its step is GUARDED by a secret, so the whole thing no-ops until you add
#     CLAWHUB_TOKEN — CI stays green out of the box.
#
# One-time human steps that cannot be automated (Anthropic plugin form,
# awesome-claude-skills PR, first-time Smithery/LobeHub registration) are tracked
# outside CI.

on:
  # Trigger on the tag push itself, NOT `release: published`. The release is
  # created by release.yml using GITHUB_TOKEN, and releases created by
  # GITHUB_TOKEN do not emit events that trigger other workflows — so a
  # `release: published` trigger here never fires. Tag-push always fires.
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate skill
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # The core tool is stdlib-only and tests import it via tests/conftest.py
      # (sys.path), so we do NOT `pip install -e .` here (the project is not
      # currently pip-installable). Just pytest; live tests are deselected by
      # the `-m 'not live'` addopts in pyproject.toml.
      - name: Install pytest
        run: pip install pytest
      - name: Unit tests (offline, no network)
        run: python -m pytest -q
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Smoke test CLI via uv (PEP 723 inline script, zero-install)
        run: uv run --script scripts/mineru.py --version
      - name: Build self-contained marketplace skill
        run: python scripts/build_skill_package.py --out dist/marketplace-skill

  publish-clawhub:
    name: Publish to ClawHub (OpenClaw)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Skips silently until CLAWHUB_TOKEN is added as a repository secret.
      - name: Install ClawHub CLI
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        if: ${{ env.CLAWHUB_TOKEN != '' }}
        run: npm install -g clawhub || npx --yes clawhub --version
      # Verified end-to-end: updates the existing ClawHub skill tsekaluk/mineru-skill
      # via `clawhub skill publish <skill-folder>`. The path must be ABSOLUTE, and
      # skills/mineru has no plugin marker so ClawHub treats it as a skill (publishing
      # the repo root fails — the Anthropic .claude-plugin manifest makes ClawHub
      # demand `package publish`, which then collides with this existing skill slug).
      - name: Publish to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
          CLAWHUB_DISABLE_TELEMETRY: "1"
        if: ${{ env.CLAWHUB_TOKEN != '' }}
        run: |
          python scripts/build_skill_package.py --out dist/marketplace-skill
          clawhub login --token "$CLAWHUB_TOKEN"
          clawhub skill publish "$PWD/dist/marketplace-skill" \
            --slug mineru-skill \
            --name "MinerU PDF Parser" \
            --version "${GITHUB_REF_NAME#v}" \
            --changelog "Release ${GITHUB_REF_NAME}"
